version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policyiq_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Hot-reload friendly: mount source during development
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
